appId: com.tylormayfield.claimday
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# ── 01: Browse — settlement list ──────────────────────────────────────────────
- runScript: scripts/wait.js
- assertVisible: "Browse"
- takeScreenshot: "01_Browse"

# ── 02: Settlement detail modal ───────────────────────────────────────────────
# Tap the first card in the list
- tapOn:
    index: 0
    text: "settlement"
- waitForAnimationToEnd
- takeScreenshot: "02_Settlement_Detail"

# Close the detail modal
- tapOn:
    id: "arrow-left"
- waitForAnimationToEnd

# ── 03: Profile setup ─────────────────────────────────────────────────────────
- tapOn:
    id: "account-circle-outline"
- waitForAnimationToEnd
- takeScreenshot: "03_My_Profile"

# Close profile modal
- tapOn:
    id: "close"
- waitForAnimationToEnd

# ── 04: Discover / Swipe deck ─────────────────────────────────────────────────
- tapOn: "Discover"
- waitForAnimationToEnd
- takeScreenshot: "04_Discover"

# ── 05: Cart ──────────────────────────────────────────────────────────────────
# Swipe right to add a card to cart first
- swipe:
    start: 20%, 50%
    end: 90%, 50%
    duration: 300
- waitForAnimationToEnd

- tapOn: "Cart"
- waitForAnimationToEnd
- takeScreenshot: "05_Cart"
